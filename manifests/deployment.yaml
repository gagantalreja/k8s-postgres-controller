apiVersion: apps/v1
kind: Deployment
metadata:
  name: sql-controller
  namespace: livedesign
  labels:
    app: sql-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sql-controller
  template:
    metadata:
      labels:
        app: sql-controller
    spec:
      serviceAccountName: sql-controller
      containers:
        - name: sql-controller
          image: 164698856500.dkr.ecr.us-east-1.amazonaws.com/livedesign-images/rehosted-images/k8s-sql-controller:v1
          imagePullPolicy: IfNotPresent
          command: ["python", "controller.py"]
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: PROVIDER
              value: aws
            - name: TF_VAR_pg_admin_username
              valueFrom:
                secretKeyRef:
                  name: pg-admin-auth
                  key: POSTGRES_USER
            - name: TF_VAR_pg_admin_password
              valueFrom:
                secretKeyRef:
                  name: pg-admin-auth
                  key: POSTGRES_PASSWORD
            - name: CONFIGMAP_NAME
              value: sql-config
            - name: CONFIGMAP_NAMESPACE
              value: livedesign
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sql-controller
  namespace: livedesign
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sql-controller
  namespace: livedesign
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: [""] # ← add this
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sql-controller
  namespace: livedesign
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sql-controller
subjects:
  - kind: ServiceAccount
    name: sql-controller
    namespace: livedesign
